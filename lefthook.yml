# https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-push:
  commands:
    packages-audit:
      tags: frontend security
      run: npm audit

pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{css,js,ts,md,astro}"
      run: npx prettier {staged_files}
